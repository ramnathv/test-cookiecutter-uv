site_name: test-cookiecutter-uv
repo_url: https://github.com/ramnathv/test-cookiecutter-uv
site_url: https://ramnathv.github.io/test-cookiecutter-uv
site_description: This is a test repository
site_author: Ramnath Vaidyanathan
edit_uri: edit/main/docs/
repo_name: ramnathv/test-cookiecutter-uv
copyright: Maintained by <a href="https://ramnathv.com">ramnathv</a>.

nav:
  - Home: index.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/test_cookiecutter_uv"]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ramnathv/test-cookiecutter-uv
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/test-cookiecutter-uv

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
